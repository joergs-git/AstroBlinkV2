name: AstroTriage
options:
  bundleIdPrefix: com.joergsflow
  deploymentTarget:
    macOS: "13.3"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  ImageDecoder:
    path: Packages/ImageDecoder

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.3"
    CLANG_CXX_LANGUAGE_STANDARD: c++17
    SWIFT_OBJC_INTEROP_MODE: objcxx

targets:
  AstroTriage:
    type: application
    platform: macOS
    sources:
      - path: AstroTriage
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: ImageDecoder
        product: ImageDecoderBridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joergsflow.AstroBlinkV2
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.photography
        INFOPLIST_KEY_CFBundleDisplayName: AstroTriage
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: AstroTriage/AstroTriage.entitlements
        DEVELOPMENT_TEAM: FDSVBU33S8
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: AstroBlinkV2
        METAL_COMPILER_FLAGS: ""
        # C++ interop for ImageDecoderBridge
        SWIFT_OBJC_INTEROP_MODE: objcxx
        OTHER_LDFLAGS:
          - "-lz"

  AstroTriageTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: AstroTriage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joergsflow.AstroTriageTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AstroTriage.app/Contents/MacOS/AstroTriage"
        BUNDLE_LOADER: "$(TEST_HOST)"
